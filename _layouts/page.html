---
layout: default
---

{% if page.banner_image %}
<div class="page-banner">
  <img src="{{ page.banner_image | relative_url }}" alt="" aria-hidden="true">
  <div class="page-banner-title">{{ page.title }}</div>
</div>
{% endif %}

<div class="page-content">
  <h1>{{ page.title }}</h1>
  {{ content }}
</div>
